version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dashjob-db
    restart: always
    environment:
      POSTGRES_USER: dashjob
      POSTGRES_PASSWORD: Dj@Postgres#2026
      POSTGRES_DB: dashjob
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dashjob']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashjob-net

  redis:
    image: redis:7-alpine
    container_name: dashjob-redis
    restart: always
    command: redis-server --requirepass Dj@Redis#2026
    volumes:
      - redis_data:/data
    networks:
      - dashjob-net

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: dashjob-backend
    restart: always
    env_file:
      - ./apps/backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - dashjob-net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: dashjob-web
    restart: always
    env_file:
      - ./apps/web/.env.production
    depends_on:
      - backend
    networks:
      - dashjob-net

  nginx:
    image: nginx:alpine
    container_name: dashjob-nginx
    restart: always
    ports:
      - '8080:8080'
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - web
    networks:
      - dashjob-net

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  dashjob-net:
    driver: bridge
